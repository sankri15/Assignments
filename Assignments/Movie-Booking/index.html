<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Booking App</title>

<style>

/* 🎥 FULL THEATRE BACKGROUND */
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;

    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* 🎬 HEADER */
h1{
    text-align:center;
    font-size:45px;
    margin-top:25px;
    color:#ffd700;
    letter-spacing:3px;
    text-shadow:
        0 0 10px #ffcc00,
        0 0 20px #ff9900,
        0 0 30px #ff6600;
}

/* 🎥 GRID */
.movies{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px;
    padding:40px;
}

/* 🎞️ GLASS CARD */
.movie{
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
    backdrop-filter: blur(8px);
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* HOVER EFFECT */
.movie:hover{
    transform: translateY(-10px) scale(1.05);
    box-shadow:0 20px 50px rgba(255, 215, 0, 0.25);
}

/* IMAGE */
.movie img{
    width:100%;
    height:280px;
    object-fit:cover;
}

/* TITLE */
.movie p{
    text-align:center;
    padding:12px;
    font-weight:bold;
    color:white;
    background:rgba(0,0,0,0.4);
    margin:0;
}

</style>
</head>

<body>

<h1>🎬 GRAND CINEMA EXPERIENCE 🎬</h1>

<div class="movies">

    <div class="movie" onclick="location.href='details.html?movie=movie1.jpg&name=Movie 1'">
        <img src="movie1.jpg">
        <p>Movie 1</p>
    </div>

    <div class="movie" onclick="location.href='details.html?movie=movie2.jpg&name=Movie 2'">
        <img src="movie2.jpg">
        <p>Movie 2</p>
    </div>

    <div class="movie" onclick="location.href='details.html?movie=movie3.jpg&name=Movie 3'">
        <img src="movie3.jpg">
        <p>Movie 3</p>
    </div>

    <div class="movie" onclick="location.href='details.html?movie=movie4.jpg&name=Movie 4'">
        <img src="movie4.jpg">
        <p>Movie 4</p>
    </div>

    <div class="movie" onclick="location.href='details.html?movie=movie5.jpg&name=Movie 5'">
        <img src="movie5.jpg">
        <p>Movie 5</p>
    </div>

</div>

</body>
</html>
