<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <h1>✨ Todo Planner</h1>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
